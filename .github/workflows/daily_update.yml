name: TarlaIQ Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Daha kararlı bir sürüm

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev # Veri okuma için şart

      - name: Install Python Dependencies
        run: |
          pip install pandas xarray numpy cdsapi netCDF4 scipy cfgrib ecmwf-api-client

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
          PYTHONHTTPSVERIFY: "0"
        run: python updater.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin main
          git rebase origin/main
          
          if [ -f tarlaiq_data.json ]; then
            git add tarlaiq_data.json
            git commit -m "Otomatik Veri Güncelleme: $(date)" || echo "Değişiklik yok"
            git push origin main
          else
            echo "HATA: tarlaiq_data.json dosyası hala oluşmadı!"
            exit 1
          fi
