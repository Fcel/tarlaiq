name: TarlaIQ Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *' # Her gece Türkiye saatiyle 03:00'te otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu (Test için)

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dosya yazma izni şart

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi çekerek çakışmaları (conflict) önler

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas xarray numpy cdsapi netCDF4 scipy

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
          PYTHONHTTPSVERIFY: "0" # SSL sertifika hatalarını kökten çözer
        run: python updater.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Çakışmaları önlemek için önce senin manuel değişikliklerini alır
          git fetch origin main
          git rebase origin/main
          
          # Sadece dosya varsa ekle, yoksa hata verme
          if [ -f tarlaiq_data.json ]; then
            git add tarlaiq_data.json
            git commit -m "Otomatik Veri Güncelleme: $(date)" || echo "Değişiklik yok"
            git push origin main
          else
            echo "HATA: tarlaiq_data.json dosyası oluşturulamadı!"
            exit 1
          fi
