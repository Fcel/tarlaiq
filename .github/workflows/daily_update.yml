name: TarlaIQ Daily Data Update

on:
  workflow_dispatch: # Manuel çalıştırma butonu

permissions:
  contents: write # GitHub ayarlarında verdiğin izni burada aktif ediyoruz

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi al ki çakışma olmasın

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade cdsapi xarray numpy netCDF4 scipy

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
        run: python updater.py

      - name: Commit and Force Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tarlaiq_data.json
          
          # Eğer dosya değişmişse commit et, değişmemişse hata verme geç
          git commit -m "Kesin Guncelleme: $(date)" || echo "Degisiklik yok"
          
          # Önce uzak sunucudaki (GitHub) hali al, sonra kendi verini zorla üzerine yaz
          git pull --rebase origin main
          git push origin main --force
