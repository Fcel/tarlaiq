name: TarlaIQ Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *' # Her gece 03:00'te çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Yazma izni şart
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi çek (Çakışma riskini bitirir)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas xarray numpy cdsapi netCDF4 scipy

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
        run: python updater.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # ÇAKIŞMAYI ÖNLEYEN KRİTİK ADIMLAR:
          git fetch origin main
          git rebase origin/main # Senin yaptığın manuel değişiklikleri robotun verisinin altına ekler
          
          git add tarlaiq_data.json
          # Eğer veri değişmemişse hata vermeden geçmesi için '|| true' ekledik
          git commit -m "Otomatik Veri Güncelleme: $(date)" || true
          
          # En son halini zorla değil, güvenle gönderir
          git push origin main
