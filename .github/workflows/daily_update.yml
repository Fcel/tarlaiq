name: TarlaIQ Daily Data Update

on:
  workflow_dispatch: # Manuel çalıştırma butonu

permissions:
  contents: write

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Scientific Libraries
        run: |
          pip install --upgrade pip
          # Hata aldığın kütüphaneleri buraya ekledik:
          pip install cdsapi xarray netCDF4 scipy numpy pandas
          
      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
        run: python updater.py

      - name: Commit and Force Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add tarlaiq_data.json
          git commit -m "Bilimsel Veri Guncelleme: $(date)" || echo "Degisiklik yok"
          git pull --rebase origin main
          git push origin main --force
