name: TarlaIQ Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update_data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas xarray numpy cdsapi netCDF4 scipy

      # KRİTİK ADIM: Eski dosyayı robotun önünden kaldırıyoruz
      - name: Pre-clean old data
        run: |
          rm -f tarlaiq_data.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
          PYTHONHTTPSVERIFY: "0"
        run: python updater.py

      - name: Commit and Push changes
        run: |
          # 1. Yeni oluşan dosyayı ekle
          git add tarlaiq_data.json
          
          # 2. Eğer dosya değişmişse veya yeni oluşmuşsa kaydet
          git commit -m "Otomatik Veri Güncelleme: $(date)" || echo "Değişiklik yok"
          
          # 3. Direkt ana kola (main) zorla gönder
          git push origin main --force
