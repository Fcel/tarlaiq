name: TarlaIQ Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update_data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          # 404 hatasını önlemek için kütüphaneyi en sona zorluyoruz
          pip install --upgrade cdsapi
          pip install pandas xarray numpy netCDF4 scipy

      - name: Pre-clean
        run: |
          rm -f tarlaiq_data.json
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
        run: python updater.py

      - name: Commit and Push
        run: |
          if [ -f tarlaiq_data.json ]; then
            git add tarlaiq_data.json
            git commit -m "Veri Güncelleme: $(date)" || echo "Değişiklik yok"
            git push origin main --force
          fi
