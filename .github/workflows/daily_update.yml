name: TarlaIQ Daily Data Update

on:
  schedule:
    - cron: '0 0 * * *' # Her gece Türkiye saatiyle 03:00'te otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  update_data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Yazma izni şart

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Tüm geçmişi çekerek çakışmaları önler

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas xarray numpy cdsapi netCDF4 scipy

      - name: Run update script
        env:
          CDS_TOKEN: ${{ secrets.CDS_TOKEN }}
          PYTHONHTTPSVERIFY: "0"
        run: python updater.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Mevcut değişiklikleri (yeni oluşan JSON'u) geçici hafızaya al
          git add tarlaiq_data.json
          git stash || echo "Saklanacak yeni veri yok"
          
          # 2. Uzak depodaki (GitHub) en güncel halini çek ve temizle
          git fetch origin main
          git reset --hard origin/main
          
          # 3. Yeni veriyi tekrar üstüne koy
          git stash pop || echo "Geri yüklenecek veri yok"
          
          # 4. Kesin ve zorunlu kayıt (Force Push)
          git add tarlaiq_data.json
          git commit -m "Otomatik Veri Güncelleme: $(date)" || echo "Değişiklik yok"
          git push origin main --force
